name: qa-test-temp
on: workflow_dispatch
jobs:
  qa:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "$HOME/Library/Python/3.11/bin" >> "$GITHUB_PATH"
      - run: /usr/local/bin/python3.11 -m pip install --user --quiet -r scripts/requirements.txt
      - env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          /usr/local/bin/python3.11 - <<'PYEOF'
          import sys, datetime
          sys.path.insert(0,"scripts")
          import run
          ep = {"id":"x","podcast":"Lex Fridman Podcast","title":"OpenClaw: The Viral AI Agent - Peter Steinberger","pub_dt":datetime.datetime(2026,2,12),"date":"2026-02-12","description":"","spotify_show":"","duration_sec":None}
          vid = run.find_youtube_id(ep["title"], ep["podcast"])
          dur,_ = run.youtube_meta(vid)
          tr = run.get_transcript(vid)
          print("REAL-PATH video:", vid, "dur:", dur, "segs:", len(tr))
          content = run.generate_content(ep, tr, vid)
          print("generated guest:", content.get("guest"))
          passed, html, c, issues = run.qa_episode(ep, content, vid, dur, tr)
          print("REAL-PATH qa passed:", passed)
          for lvl,m in issues: print("  issue:", lvl, m)
          PYEOF
