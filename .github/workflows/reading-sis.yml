name: Reading.Sis

on:
  schedule:
    # 3:00 AM UTC = 6:00 AM Israel (UTC+3)
    # Days 0-5 = Sun, Mon, Tue, Wed, Thu, Fri  (skips Saturday = day 6)
    - cron: '0 3 * * 0-5'
  workflow_dispatch:   # also triggerable manually from GitHub Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Reading.Sis pipeline
        env:
          GH_PAT:               ${{ secrets.GH_PAT }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GREENAPI_INSTANCE_ID: ${{ secrets.GREENAPI_INSTANCE_ID }}
          GREENAPI_API_TOKEN:   ${{ secrets.GREENAPI_API_TOKEN }}
          GREENAPI_GROUP_ID:    ${{ secrets.GREENAPI_GROUP_ID }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
        run: python scripts/run.py
