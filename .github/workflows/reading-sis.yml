name: Reading.Sis

on:
  schedule:
    # 3:00 AM UTC = 6:00 AM Israel (UTC+3)
    # Days 0-5 = Sun, Mon, Tue, Wed, Thu, Fri  (skips Saturday = day 6)
    - cron: '0 3 * * 0-5'
  workflow_dispatch:   # also triggerable manually from GitHub Actions tab

jobs:
  run:
    # Self-hosted (Noam's Mac): YouTube blocks GitHub-hosted runner IPs,
    # which kills video search and transcript fetch. If the Mac is asleep
    # the job queues and runs when it wakes.
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add local bins to PATH
        # /usr/local/bin: node (yt-dlp needs a JS runtime for YouTube)
        # ~/Library/Python/3.11/bin: yt-dlp installed via pip --user
        run: |
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "$HOME/Library/Python/3.11/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: /usr/local/bin/python3.11 -m pip install --user --quiet -r scripts/requirements.txt

      - name: Run Reading.Sis pipeline
        env:
          GH_PAT:               ${{ secrets.GH_PAT }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GREENAPI_INSTANCE_ID: ${{ secrets.GREENAPI_INSTANCE_ID }}
          GREENAPI_API_TOKEN:   ${{ secrets.GREENAPI_API_TOKEN }}
          GREENAPI_GROUP_ID:    ${{ secrets.GREENAPI_GROUP_ID }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_TO_NOAM:     ${{ secrets.WHATSAPP_TO_NOAM }}
        run: /usr/local/bin/python3.11 scripts/run.py
