name: Reading.Sis

on:
  schedule:
    # Times are UTC; Israel = UTC+3. Runs EVERY day (no weekend hold).
    # 3:00 UTC = 6:00 IL — generate phase: discover episodes, build + push pages.
    - cron: '0 3 * * *'
    # 4:00 UTC = 7:00 IL — send phase: verify every page URL is live, then
    # send the WhatsApp messages. The hour gap gives GitHub Pages plenty of
    # time to finish deploying everything.
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Phase to run'
        type: choice
        options:
          - generate
          - send
          - library
        default: generate

jobs:
  run:
    # Self-hosted (Noam's Mac): YouTube blocks GitHub-hosted runner IPs,
    # which kills video search and transcript fetch. If the Mac is asleep
    # the job queues and runs when it wakes.
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add local bins to PATH
        # /usr/local/bin: node (yt-dlp needs a JS runtime for YouTube)
        # ~/Library/Python/3.11/bin: yt-dlp installed via pip --user
        run: |
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "$HOME/Library/Python/3.11/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: /usr/local/bin/python3.11 -m pip install --user --quiet -r scripts/requirements.txt

      - name: Run Reading.Sis pipeline
        env:
          GH_PAT:               ${{ secrets.GH_PAT }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GREENAPI_INSTANCE_ID: ${{ secrets.GREENAPI_INSTANCE_ID }}
          GREENAPI_API_TOKEN:   ${{ secrets.GREENAPI_API_TOKEN }}
          GREENAPI_GROUP_ID:    ${{ secrets.GREENAPI_GROUP_ID }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          GOATCOUNTER_CODE:     ${{ vars.GOATCOUNTER_CODE }}
          WHATSAPP_TO_NOAM:     ${{ secrets.WHATSAPP_TO_NOAM }}
        run: |
          PHASE="${{ inputs.phase }}"
          if [ -z "$PHASE" ]; then
            if [ "${{ github.event.schedule }}" = "0 4 * * *" ]; then
              PHASE=send
            else
              PHASE=generate
            fi
          fi
          echo "Phase: $PHASE"
          case "$PHASE" in
            send)    /usr/local/bin/python3.11 scripts/run.py --send ;;
            library) /usr/local/bin/python3.11 scripts/run.py --library ;;
            *)       /usr/local/bin/python3.11 scripts/run.py ;;
          esac
