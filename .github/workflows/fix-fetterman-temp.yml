name: fix-fetterman-temp
on: workflow_dispatch
jobs:
  fix:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "$HOME/Library/Python/3.11/bin" >> "$GITHUB_PATH"
      - run: /usr/local/bin/python3.11 -m pip install --user --quiet -r scripts/requirements.txt
      - env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOATCOUNTER_CODE: ${{ vars.GOATCOUNTER_CODE }}
        run: |
          /usr/local/bin/python3.11 - <<'PYEOF'
          import sys, datetime
          sys.path.insert(0,"scripts")
          import run, feedparser
          feed = feedparser.parse("https://rss.libsyn.com/shows/254861/destinations/1928300.xml")
          cands=[]
          for e in feed.entries:
              pub=datetime.datetime(*e.published_parsed[:6])+datetime.timedelta(hours=3)
              if pub.strftime("%Y-%m-%d")=="2026-06-10": cands.append((pub,e))
          cands.sort(key=lambda x:x[0])  # earliest first
          assert len(cands)>=2, f"expected 2 on 06-10, got {len(cands)}"
          pub_il, entry = cands[1]  # the LATER one = Fetterman, -> -2
          ep={"id":"all-in-2026-06-10-2","podcast":"All-In","title":entry.title,
              "description":getattr(entry,"summary",""),"pub_dt":pub_il,"date":"2026-06-10",
              "duration_sec":run._parse_duration(getattr(entry,"itunes_duration",None)),
              "spotify_show":"","lex_filter":False}
          print("Title:", entry.title)
          vid=run.find_youtube_id(ep["title"],ep["podcast"]); dur=None
          if vid and run.verify_youtube_match(vid,ep): dur,_=run.youtube_meta(vid)
          elif vid: vid=None
          tr=run.get_transcript(vid) if vid else []
          print("video:",vid,"segs:",len(tr))
          content=run.generate_content(ep,tr,vid or "",model=run.MODEL)
          assert content and not content.get("skip")
          passed,html,content,issues=run.qa_episode(ep,content,vid,dur,tr,gen_model=run.MODEL)
          for l,m in issues: print("QA",l,m)
          assert passed
          run.gh_put("all-in-2026-06-10-2.html",html.encode("utf-8"),"feat: add all-in-2026-06-10-2 (Fetterman/McCormick)")
          print("Pushed all-in-2026-06-10-2")
          t,sha=run.get_tracker()
          if not any((e.get("id") if isinstance(e,dict) else e)=="all-in-2026-06-10-2" for e in t["processed"]):
              t["processed"].append({"id":"all-in-2026-06-10-2","podcast":"All-In","guest":content.get("guest"),
                  "title":ep["title"],"date":"2026-06-10","page_url":f"{run.PAGES_BASE}/all-in-2026-06-10-2.html","pushed_at":str(datetime.date.today())})
              sha=run.save_tracker(t,sha)
          run.push_library(t)
          print("Library rebuilt. Done.")
          PYEOF
