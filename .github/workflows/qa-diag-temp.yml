name: qa-diag-temp
on: workflow_dispatch
jobs:
  d:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "$HOME/Library/Python/3.11/bin" >> "$GITHUB_PATH"
      - run: /usr/local/bin/python3.11 -m pip install --user --quiet -r scripts/requirements.txt
      - env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          /usr/local/bin/python3.11 - <<'PYEOF'
          import sys, datetime, json
          sys.path.insert(0,"scripts")
          import run, feedparser
          from anthropic import Anthropic
          feed=feedparser.parse("https://rss.libsyn.com/shows/254861/destinations/1928300.xml")
          ent=[(datetime.datetime(*e.published_parsed[:6])+datetime.timedelta(hours=3),e) for e in feed.entries]
          ent=[x for x in ent if x[0].strftime("%Y-%m-%d")=="2026-06-10"]; ent.sort(key=lambda x:x[0])
          pub,entry=ent[1]
          ep={"id":"x","podcast":"All-In","title":entry.title,"pub_dt":pub,"date":"2026-06-10"}
          vid=run.find_youtube_id(ep["title"],ep["podcast"]); tr=run.get_transcript(vid)
          content=run.generate_content(ep,tr,vid,model=run.MODEL)
          print("transcript chars:", len("\n".join(s["text"] for s in tr)))
          # Monkeypatch to capture the raw msg inside qa_content_review
          c=Anthropic(api_key=run.ANTHROPIC_KEY)
          tt="\n".join(s["text"] for s in tr)[:24000]
          quotes=[{"index":i,"speaker":m.get("speaker",""),"quote":m.get("quote","")} for i,m in enumerate(content.get("moments",[]))]
          prompt=f"""QA review. Episode title: {ep['title']}
Stated guest: {content.get('guest')}
Quotes: {json.dumps(quotes, ensure_ascii=False)}
Transcript: {tt}
Return JSON only: {{"guest_ok":true,"bad_quote_indexes":[],"overall_ok":true,"summary":"clean"}}"""
          print("prompt chars:", len(prompt))
          msg=c.messages.create(model=run.MODEL,max_tokens=600,messages=[{"role":"user","content":prompt}])
          print("STOP_REASON:", msg.stop_reason)
          print("USAGE:", msg.usage.input_tokens, "in /", msg.usage.output_tokens, "out")
          print("N_BLOCKS:", len(msg.content))
          for i,b in enumerate(msg.content):
              print(f"  block{i} type={getattr(b,'type','?')} textrepr={repr(getattr(b,'text',''))[:300]}")
          PYEOF
