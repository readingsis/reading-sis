name: yt-diagnostic
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: pip install --quiet youtube-transcript-api yt-dlp
      - run: |
          python - <<'PYEOF'
          import subprocess
          r = subprocess.run(["yt-dlp", "ytsearch1:Lenny's Podcast Tony Fadell", "--print", "%(id)s",
                              "--no-download", "--quiet"], capture_output=True, text=True, timeout=60)
          print(f"YTDLP_SEARCH rc={r.returncode} out={r.stdout.strip()!r} err={r.stderr.strip()[:200]!r}")
          from youtube_transcript_api import YouTubeTranscriptApi
          try:
              segs = YouTubeTranscriptApi().fetch("RJjl1TwyfWM")
              print(f"TRANSCRIPT_OK segments={len(segs.snippets)}")
          except Exception as e:
              print(f"TRANSCRIPT_FAIL {type(e).__name__}: {str(e)[:300]}")
          PYEOF
